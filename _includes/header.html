<header>
  <div class="header-container">

    <!-- LEFT: LOGO + SOCIAL -->
    <div class="header-left">
      <div class="logo">
        <a href="/" style="
          text-decoration:none;
          color:white;
          font-weight:700;
          letter-spacing:0.04em;
          font-size:1.1rem;
        ">
          TravelFilm<span style="color: var(--primary);">GR</span>
        </a>
      </div>

      <div class="social-icons">
        <a href="https://www.instagram.com/travelfilm_gr/" target="_blank" aria-label="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="https://www.tiktok.com/@travelfilm.gr" target="_blank" aria-label="TikTok">
          <i class="fab fa-tiktok"></i>
        </a>
      </div>
    </div>

    <!-- CENTER: NAV -->
    <nav>
      <a href="/" class="{% if page.url == '/' %}active{% endif %}">
        <span data-en="Home" data-el="Αρχική">Home</span>
      </a>

      <a href="/gallery/" class="{% if page.url contains 'gallery' %}active{% endif %}">
        <span data-en="Gallery" data-el="Gallery">Gallery</span>
      </a>

      <a href="/blog/" class="{% if page.url contains 'blog' %}active{% endif %}">
        <span data-en="Blog" data-el="Blog">Blog</span>
      </a>

      <a href="/about/" class="{% if page.url contains 'about' %}active{% endif %}">
        <span data-en="About" data-el="Σχετικά">About</span>
      </a>
    </nav>

    <!-- RIGHT: LANGUAGE + THEME -->
    <div class="lang-switch">
      <button type="button" class="lang-btn" data-lang="en" aria-label="English">
        🇬🇧
      </button>

      <button type="button" class="lang-btn" data-lang="el" aria-label="Ελληνικά">
        🇬🇷
      </button>

      <button type="button" class="theme-toggle" aria-label="Toggle theme">
        🌙
      </button>
    </div>

  </div>
</header>
