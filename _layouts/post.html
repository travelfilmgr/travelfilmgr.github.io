<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | TravelFilm GR</title>
  <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 150 }}">
  <meta name="theme-color" content="#0b0b0b">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script defer src="{{ '/assets/js/script.js' | relative_url }}"></script>
</head>

<body>

  {% include header.html %}

  <main class="post-page">
    <article class="post-article fade-in">

      <div class="post-container">

        <div class="post-meta">
          {% if page.category %}
            <span class="post-category">{{ page.category }}</span>
          {% endif %}

          <span class="post-date">
            {{ page.date | date: "%d %b %Y" }}
          </span>
        </div>

        <h1 class="post-title">{{ page.title }}</h1>

        {% if page.subtitle %}
          <p class="post-subtitle">{{ page.subtitle }}</p>
        {% endif %}

        <div class="post-content">
          {{ content }}
        </div>

      </div>

    </article>
  </main>

  {% include footer.html %}

</body>
</html>
