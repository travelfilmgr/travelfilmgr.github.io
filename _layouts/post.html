<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | TravelFilm GR</title>
  <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 150 }}">
  <meta name="theme-color" content="#0b0b0b">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Theme + Language init -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const savedLang = localStorage.getItem('lang');

      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }

      if (savedLang) {
        document.documentElement.setAttribute('lang', savedLang);
      }
    })();
  </script>

  <script defer src="{{ '/assets/js/script.js' | relative_url }}"></script>
</head>

<body>

  {% include header.html %}

  <main class="post-page">
    <article class="post-article fade-in">

      {% if page.image %}
        <div class="post-hero">
          <img src="{{ page.image }}" alt="{{ page.title }}" loading="lazy">
        </div>
      {% endif %}

      <div class="post-container">

        <div class="post-meta">
          <div class="post-meta-left">
            {% if page.category %}
              <span class="post-category">{{ page.category }}</span>
            {% endif %}
          </div>

          <div class="post-meta-right">
            <span class="post-date">
              {{ page.date | date: "%d %b %Y" }}
            </span>

            <span class="post-reading-time" data-en="• 1 min read" data-el="• 1 λεπτό ανάγνωση">
              • 1 min read
            </span>

            <button type="button" class="copy-link-btn" aria-label="Copy post link">
              <i class="fa-solid fa-link"></i>
              <span data-en="Copy link" data-el="Αντιγραφή συνδέσμου">Copy link</span>
            </button>
          </div>
        </div>

        <h1 class="post-title">{{ page.title }}</h1>

        {% if page.subtitle %}
          <p class="post-subtitle">{{ page.subtitle }}</p>
        {% endif %}

        <div class="post-content">
          {{ content }}
        </div>

        <div class="post-bottom-link">
          <a href="/blog/">
            <span data-en="← Back to Blog" data-el="← Επιστροφή στο Blog">← Back to Blog</span>
          </a>
        </div>

      </div>

    </article>
  </main>

  {% include footer.html %}

</body>
</html>
