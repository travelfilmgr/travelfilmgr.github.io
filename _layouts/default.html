<!DOCTYPE html>
<html lang="en">
<head>

  <!-- BASIC -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TITLE -->
  <title>
    {% if page.title == "Home" %}
      TravelFilm GR
    {% else %}
      {{ page.title }} | TravelFilm GR
    {% endif %}
  </title>

  <!-- SEO -->
  <meta name="description" content="TravelFilm GR — travel photography, cinematic moments, and visual storytelling from Greece and beyond.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0b0b0b">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- OPEN GRAPH (SOCIAL PREVIEW) -->
  <meta property="og:title" content="{{ page.title | default: 'TravelFilm GR' }}">
  <meta property="og:description" content="Travel photography, cinematic moments, and visual storytelling from Greece and beyond.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/images/og-image.jpg' | absolute_url }}">
  <meta property="og:site_name" content="TravelFilm GR">

  <!-- TWITTER -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: 'TravelFilm GR' }}">
  <meta name="twitter:description" content="Travel photography, cinematic moments, and visual storytelling from Greece and beyond.">
  <meta name="twitter:image" content="{{ '/assets/images/og-image.jpg' | absolute_url }}">

  <!-- FAVICON -->
  <link rel="icon" href="/assets/images/favicon.png">

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- THEME + LANGUAGE INIT (no flash) -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      const savedLang = localStorage.getItem('lang') || 'en';

      document.documentElement.setAttribute('data-theme', savedTheme);
      document.documentElement.setAttribute('lang', savedLang);
    })();
  </script>

  <!-- JS -->
  <script defer src="{{ '/assets/js/script.js' | relative_url }}"></script>

</head>

<body>

  <!-- HEADER -->
  {% include header.html %}

  <!-- MAIN CONTENT -->
  <main id="main-content">
    {{ content }}
  </main>

  <!-- FOOTER -->
  {% include footer.html %}

  <!-- ANALYTICS NOTICE -->
  <div
    id="analytics-banner"
    style="
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(11,11,11,0.96);
      color: #fff;
      text-align: center;
      padding: 12px 64px 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      z-index: 9999;
      border-top: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      box-sizing: border-box;
      opacity: 1;
      transition: opacity 0.35s ease, transform 0.35s ease;
    "
  >
    <span
      data-en="This website uses privacy-first, cookie-free analytics for basic traffic insights and Cloudflare services for security and performance. Learn more in the Privacy Policy."
      data-el="Αυτός ο ιστότοπος χρησιμοποιεί privacy-first analytics χωρίς cookies για βασικά στατιστικά επισκεψιμότητας και υπηρεσίες Cloudflare για ασφάλεια και απόδοση. Περισσότερα στην Πολιτική Απορρήτου."
    >
      This website uses privacy-first, cookie-free analytics for basic traffic insights and Cloudflare services for security and performance. Learn more in the Privacy Policy.
    </span>
  </div>

  <!-- PREMIUM CLOSE BUTTON -->
  <button
    id="analytics-banner-close"
    type="button"
    aria-label="Close notice"
    onclick="closeAnalyticsBanner()"
    style="
      position: fixed;
      right: 16px;
      bottom: 14px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      z-index: 10000;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.28);
      transition: opacity 0.35s ease, transform 0.35s ease, background 0.25s ease;
    "
    onmouseover="this.style.background='rgba(255,255,255,0.20)'"
    onmouseout="this.style.background='rgba(255,255,255,0.10)'"
  >
    ×
  </button>

  <script>
    function closeAnalyticsBanner() {
      const banner = document.getElementById('analytics-banner');
      const closeBtn = document.getElementById('analytics-banner-close');

      if (banner) {
        banner.style.opacity = '0';
        banner.style.transform = 'translateY(12px)';
      }

      if (closeBtn) {
        closeBtn.style.opacity = '0';
        closeBtn.style.transform = 'translateY(12px)';
        closeBtn.style.pointerEvents = 'none';
      }

      setTimeout(() => {
        if (banner) banner.style.display = 'none';
        if (closeBtn) closeBtn.style.display = 'none';
      }, 350);
    }
  </script>

  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "c4ab79bd66f848e6a3b29bd41671cdc7"}'></script>
  <!-- End Cloudflare Web Analytics -->

</body>
</html>
