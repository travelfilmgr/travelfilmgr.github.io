<!-- ANALYTICS NOTICE -->
<div id="analytics-banner"
  data-en="This website uses privacy-first, cookie-free analytics for basic traffic insights."
  data-el="Αυτός ο ιστότοπος χρησιμοποιεί privacy-first analytics χωρίς cookies για βασικά στατιστικά επισκεψιμότητας."
  style="
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(11,11,11,0.96);
    color:#fff;
    padding:12px 40px 12px 16px;
    font-size:14px;
    line-height:1.6;
    z-index:9999;
    border-top:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    text-align:center;
  "
>
  This website uses privacy-first, cookie-free analytics for basic traffic insights.

  <!-- CLOSE BUTTON -->
  <span onclick="closeBanner()" style="
    position:absolute;
    right:15px;
    top:10px;
    cursor:pointer;
    font-size:18px;
    opacity:0.7;
  ">
    ✕
  </span>
</div>

<script>
  function closeBanner() {
    document.getElementById('analytics-banner').style.display = 'none';
    localStorage.setItem('bannerClosed', 'true');
  }

  // μην το ξαναδεί αν το έκλεισε
  if (localStorage.getItem('bannerClosed') === 'true') {
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById('analytics-banner').style.display = 'none';
    });
  }
</script>
